name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master", "academyetalon"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npx vite build
        env:
          NODE_ENV: production
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/' }}

      - name: Add .nojekyll
        run: touch dist/public/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/public
          cname: ${{ vars.CUSTOM_DOMAIN }}
